<!-- @dsCard group="Type" viewport="700x180" name="UI sans — Inter" subtitle="Chrome text, 11–14px, compact" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-tool); font-family: var(--font-sans); color: var(--text-primary); padding: 16px 20px; }
  .stack { display: flex; flex-direction: column; gap: 11px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); width: 96px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="stack">
  <div class="line"><span class="lab">14 / 600</span><span style="font-size:14px;font-weight:600">Implement worktree teardown</span></div>
  <div class="line"><span class="lab">13 / 400</span><span style="font-size:13px">Primary UI text and labels — the workhorse size</span></div>
  <div class="line"><span class="lab">12 / 400</span><span style="font-size:12px;color:var(--text-secondary)">Secondary text, tabs, tree rows</span></div>
  <div class="line"><span class="lab">11 / 600</span><span style="font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-tertiary);font-weight:600">Section label · agents</span></div>
</div>
</body>
</html>
