<!-- @dsCard group="Brand" viewport="700x200" name="Logomark & wordmark" subtitle="Session-tree mark · placeholder pending real brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-tool); font-family: var(--font-sans); color: var(--text-primary); padding: 20px 24px; display: flex; gap: 36px; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .lockup { display: flex; align-items: center; gap: 10px; }
  .word { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .cap { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; }
  .light { background: #F2F3F5; border-radius: var(--radius-2); padding: 14px 18px; }
  .light .word { color: #1A1B1E; }
  .swatchwrap { display:flex; gap: 22px; align-items:center; }
</style>
</head>
<body>
<div class="swatchwrap">
  <div class="cell">
    <div class="lockup">
      <img src="../assets/capisco-mark.svg" width="34" height="34" alt="" />
      <span class="word">capisco</span>
    </div>
    <span class="cap">Primary · on dark</span>
  </div>
  <div class="cell">
    <div class="lockup light">
      <img src="../assets/capisco-mark.svg" width="34" height="34" alt="" />
      <span class="word">capisco</span>
    </div>
    <span class="cap">On light</span>
  </div>
  <div class="cell">
    <img src="../assets/capisco-mark-teal.svg" width="40" height="40" alt="" />
    <span class="cap">Mono · teal</span>
  </div>
</div>
</body>
</html>
