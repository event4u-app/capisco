<!-- @dsCard group="Colors" viewport="700x150" name="Text ramp" subtitle="Three-step text hierarchy on tool-window bg" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-tool); font-family: var(--font-sans); padding: 18px 20px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 130px; }
  .p { color: var(--text-primary); font-size: 14px; }
  .s { color: var(--text-secondary); font-size: 14px; }
  .t { color: var(--text-tertiary); font-size: 14px; }
  .a { color: var(--accent); font-size: 14px; }
</style>
</head>
<body>
<div class="stack">
  <div class="line"><span class="lab">--text-primary</span><span class="p">Code, labels, active values — #DFE1E5</span></div>
  <div class="line"><span class="lab">--text-secondary</span><span class="s">Paths, hints, inactive tabs — #868781</span></div>
  <div class="line"><span class="lab">--text-tertiary</span><span class="t">Disabled, recessed metadata — #5A5D63</span></div>
  <div class="line"><span class="lab">--accent</span><span class="a">Links, focus, active state — #3FB6A8</span></div>
</div>
</body>
</html>
