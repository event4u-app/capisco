<!-- @dsCard group="Colors" viewport="700x170" name="Syntax & rainbow brackets" subtitle="Muted, never neon — over the editor bg" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-tool); padding: 14px 16px; }
  .editor { background: var(--bg-editor); border: 1px solid var(--border); border-radius: var(--radius-1); padding: 12px 14px; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }
  .kw { color: var(--syn-keyword); } .ctl { color: var(--syn-control); } .str { color: var(--syn-string); }
  .num { color: var(--syn-number); } .com { color: var(--syn-comment); font-style: italic; }
  .fn { color: var(--syn-function); } .ty { color: var(--syn-type); } .var { color: var(--syn-variable); }
  .op { color: var(--syn-operator); } .prop { color: var(--syn-property); }
  .b1 { color: var(--bracket-1); } .b2 { color: var(--bracket-2); } .b3 { color: var(--bracket-3); }
</style>
</head>
<body>
<div class="editor">
<div><span class="com">// capability check — broker grants scoped access</span></div>
<div><span class="kw">async</span> <span class="fn">checkCapability</span><span class="b1">(</span><span class="var">principal</span><span class="op">:</span> <span class="ty">Principal</span><span class="op">,</span> <span class="var">cap</span><span class="op">:</span> <span class="ty">Capability</span><span class="b1">)</span> <span class="b2">{</span></div>
<div>&nbsp;&nbsp;<span class="ctl">if</span> <span class="b3">(</span><span class="var">principal</span><span class="op">.</span><span class="prop">trusted</span> <span class="op">&amp;&amp;</span> <span class="var">cap</span><span class="op">.</span><span class="prop">scope</span> <span class="op">===</span> <span class="str">"session"</span><span class="b3">)</span> <span class="kw">return</span> <span class="num">true</span><span class="op">;</span></div>
<div>&nbsp;&nbsp;<span class="kw">return</span> <span class="kw">await</span> <span class="var">this</span><span class="op">.</span><span class="fn">prompt</span><span class="b3">(</span><span class="var">cap</span><span class="b3">)</span><span class="op">;</span></div>
<div><span class="b2">}</span></div>
</div>
</body>
</html>
