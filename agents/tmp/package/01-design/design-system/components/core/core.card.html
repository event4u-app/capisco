<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-tool);
    font-family: var(--font-sans);
    color: var(--text-primary);
    padding: 18px 20px;
  }
  .row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .group { display: flex; align-items: center; gap: 8px; }
  .cap { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; width: 100%; margin-bottom: -4px; }
  .icon { display: inline-flex; }
  .icon svg { width: 100%; height: 100%; display: block; stroke-width: 1.6; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input } = window.CapiscoDesignSystem_026f1e;
  function Icon({ name, size = 15, color }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      const el = ref.current; if (!el || !window.lucide) return;
      el.innerHTML = '<i data-lucide="' + name + '"></i>';
      window.lucide.createIcons();
    }, [name]);
    return <span ref={ref} className="icon" style={{ width: size, height: size, color }} />;
  }
  const I = (name) => <Icon name={name} size={15} />;

  function Demo() {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div className="row">
          <div className="group">
            <Button variant="primary">Allow once</Button>
            <Button variant="default">This session</Button>
            <Button variant="ghost">Deny</Button>
            <Button variant="default" disabled>Disabled</Button>
          </div>
          <div className="group">
            <IconButton icon={I('files')} active title="Explorer" />
            <IconButton icon={I('git-branch')} title="Commit" />
            <IconButton icon={I('search')} title="Search" />
            <IconButton icon={I('settings')} title="Settings" />
          </div>
          <div style={{ width: 230 }}>
            <Input leading={I('search')} placeholder="Search files…" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
