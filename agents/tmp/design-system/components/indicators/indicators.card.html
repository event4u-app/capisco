<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg-tool); font-family: var(--font-sans); color: var(--text-primary); padding: 18px 20px; }
  .col { display: flex; flex-direction: column; gap: 8px; font-size: 12px; }
  .line { display: flex; align-items: center; gap: 8px; }
  .lbl { color: var(--text-secondary); }
  .sep { width: 1px; height: 46px; background: var(--border); }
  .wrap { display: flex; gap: 28px; align-items: flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatusDot, ModelBadge, GitMarker } = window.CapiscoDesignSystem_026f1e;
  function Demo() {
    return (
      <div className="wrap">
        <div className="col">
          <div className="line"><StatusDot status="running" /><span className="lbl">running</span></div>
          <div className="line"><StatusDot status="idle" /><span className="lbl">idle</span></div>
          <div className="line"><StatusDot status="waiting" /><span className="lbl">waiting · needs approval</span></div>
        </div>
        <div className="sep"></div>
        <div className="col">
          <div className="line"><ModelBadge>Claude</ModelBadge><ModelBadge>GPT-5</ModelBadge><ModelBadge tone="accent">Local</ModelBadge></div>
          <div className="line lbl" style={{ marginTop: 4 }}>neutral by default · accent to spotlight</div>
        </div>
        <div className="sep"></div>
        <div className="col">
          <div className="line"><GitMarker status="M" /><span className="lbl">modified</span></div>
          <div className="line"><GitMarker status="A" /><span className="lbl">added</span></div>
          <div className="line"><GitMarker status="D" /><span className="lbl">deleted</span></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
